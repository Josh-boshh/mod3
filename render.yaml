# Render Blueprint — deploys the web service + PostgreSQL database together.
# Run: connect this repo in Render dashboard → "New Blueprint Instance"
#
# Database note: the free Render PostgreSQL plan was discontinued.
# Cheapest managed option is Render PostgreSQL Starter ($7/month).
# Free alternative: create a database on https://neon.tech (free tier)
#   and set DATABASE_URL manually in the Render environment variables.

services:
  - type: web
    name: mod3
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mod3-db
          property: connectionString
      - key: SPAM_IP_HASH_KEY
        generateValue: true   # Render generates a random value on first deploy

databases:
  - name: mod3-db
    databaseName: mod3
    plan: starter             # $7/month — remove this block if using Neon
